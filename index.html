<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect Button</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #222;
    }

    p {
      margin: 0 0 24px;
      color: #666;
      font-size: 15px;
    }

    button {
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Добро пожаловать</h1>
    <p>Нажмите кнопку, чтобы перейти на сайт</p>

    <button onclick="redirectToSite()">
      Открыть сайт
    </button>
  </div>

  <script>
    function redirectToSite() {
      window.location.href = "https://script.google.com/macros/u/1/s/AKfycbxGySUDNbfqVOpcieRKwhVM4FD--GvVS5hkVLvJ7wMlil30SAMbMHo-wErTqVxUpXKW/exec";
    }
  </script>

</body>
</html>
